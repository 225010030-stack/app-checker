name: Test WeChat Push

on:
 workflow_dispatch:

jobs:
 test-push:
  runs-on: ubuntu-latest
  steps:
   - name: Send test message to WeCom
    env:
     WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
    run: |
     curl -X POST "$WEBHOOK_URL" \
     -H 'Content-Type: application/json' \
     -d '{
      "msgtype": "markdown",
      "markdown": {
       "content": "## ✅ FPP检查助手测试消息\n\n这是一条测试推送，用于验证企业微信机器人是否配置成功。\n\n测试信息\n> 发送时间：2026年6月2日\n> 发送者：GitHub Actions\n> 仓库：fpp-checker\n\n如果你能看到这条消息，说明配置成功！🎉\n\n后续正式推送将包含FPP检查结果，请留意查看。"
      }
     }'
